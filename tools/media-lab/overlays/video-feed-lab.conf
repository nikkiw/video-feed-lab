# Project-specific aliases layered on top of universal-media-lab's canonical
# /api, /media, /img and /mock routes. `last` intentionally re-enters the
# gateway location matcher so Range, MIME, imgproxy and WireMock behavior stay
# owned by the upstream lab configuration.

location = /vfl/api/feed {
  rewrite ^ /api/v1/feed last;
}

location ~ ^/vfl/api/media/([a-z0-9-]+)$ {
  rewrite ^/vfl/api/media/([a-z0-9-]+)$ /api/v1/media/$1 last;
}

location ~ ^/vfl/media/([a-z0-9-]+)/hls/(.+)$ {
  rewrite ^/vfl/media/([a-z0-9-]+)/hls/(.+)$ /media/generated/$1/hls/$2 last;
}

location ~ ^/vfl/media/([a-z0-9-]+)/dash/(.+)$ {
  rewrite ^/vfl/media/([a-z0-9-]+)/dash/(.+)$ /media/generated/$1/dash/$2 last;
}

location ~ ^/vfl/media/([a-z0-9-]+)/progressive$ {
  rewrite ^/vfl/media/([a-z0-9-]+)/progressive$ /media/generated/$1/progressive/video.mp4 last;
}

location ~ ^/vfl/poster/([a-z0-9-]+)/placeholder\.webp$ {
  rewrite ^/vfl/poster/([a-z0-9-]+)/placeholder\.webp$ /img/insecure/rs:fill:36:64/q:20/bl:8/plain/local:///generated/$1/poster.jpg@webp last;
}

location ~ ^/vfl/poster/([a-z0-9-]+)/thumbnail\.webp$ {
  rewrite ^/vfl/poster/([a-z0-9-]+)/thumbnail\.webp$ /img/insecure/rs:fill:360:640/q:70/plain/local:///generated/$1/poster.jpg@webp last;
}

location ~ ^/vfl/poster/([a-z0-9-]+)/feed\.webp$ {
  rewrite ^/vfl/poster/([a-z0-9-]+)/feed\.webp$ /img/insecure/rs:fill:720:1280/q:75/plain/local:///generated/$1/poster.jpg@webp last;
}

location ~ ^/vfl/poster/([a-z0-9-]+)/full-hd\.webp$ {
  rewrite ^/vfl/poster/([a-z0-9-]+)/full-hd\.webp$ /img/insecure/rs:fill:1080:1920/q:75/plain/local:///generated/$1/poster.jpg@webp last;
}

location ~ ^/vfl/poster/([a-z0-9-]+)/feed\.avif$ {
  rewrite ^/vfl/poster/([a-z0-9-]+)/feed\.avif$ /img/insecure/rs:fill:720:1280/q:55/plain/local:///generated/$1/poster.jpg@avif last;
}

location ~ ^/vfl/fault/ttfb/(200|1000|3000)/([a-z0-9-]+)/hls/(.+)$ {
  rewrite ^/vfl/fault/ttfb/(200|1000|3000)/([a-z0-9-]+)/hls/(.+)$ /mock/ttfb/$1/media/generated/$2/hls/$3 last;
}

location ~ ^/vfl/fault/ttfb/(200|1000|3000)/([a-z0-9-]+)/progressive$ {
  rewrite ^/vfl/fault/ttfb/(200|1000|3000)/([a-z0-9-]+)/progressive$ /mock/ttfb/$1/media/generated/$2/progressive/video.mp4 last;
}

location ~ ^/vfl/fault/status/(404|429|500|503)$ {
  rewrite ^/vfl/fault/status/(404|429|500|503)$ /mock/status/$1 last;
}

location = /vfl/fault/reset {
  rewrite ^ /mock/fault/reset last;
}
